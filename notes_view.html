<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>राजनीति विज्ञान नोट्स - Google Docs Viewer</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body {
        margin: 0;
        padding: 0;
        overflow: hidden; /* Prevent body scroll, let iframe do the scrolling */
        background: var(--bg-color);
        display: flex;
        flex-direction: column;
        height: 100vh;
    }
    
    .top-bar {
        background: #0b0c10;
        padding: 15px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 2px solid #444;
        flex-shrink: 0;
    }
    
    .back-btn {
        display: inline-block;
        padding: 8px 15px;
        background: var(--accent-color);
        color: #0b0c10;
        font-weight: bold;
        border-radius: 8px;
        text-decoration: none;
        font-family: Arial, sans-serif;
    }
    
    .chapter-title {
        color: var(--accent-color);
        margin: 0;
        font-family: sans-serif;
        font-size: 1.5em;
    }

    #doc-iframe {
        width: 100%;
        flex-grow: 1;
        border: none;
        background: #fff; /* Ensure document background is white */
    }

    #loadingMsg {
        color: #fff;
        text-align: center;
        font-family: Arial;
        margin-top: 50px;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <a href="index.html" class="back-btn">🏠 पोर्टल पर वापस जाएँ</a>
    <h1 id="chapterTitle" class="chapter-title">लोड हो रहा है...</h1>
    <div style="width: 100px;"></div> <!-- Spacer for centering -->
  </div>

  <div id="loadingMsg">
     <h2>📡 Google Document सुरक्षित रूप से लोड हो रहा है...</h2>
  </div>

  <iframe id="doc-iframe" style="display:none;" title="Google Docs Viewer"></iframe>
  
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const chapterId = urlParams.get('id');
      const titleElem = document.getElementById('chapterTitle');
      const loadingMsg = document.getElementById('loadingMsg');
      const iframe = document.getElementById('doc-iframe');

      if (!chapterId) {
         titleElem.innerText = "त्रुटि: अध्याय नहीं मिला";
         loadingMsg.innerHTML = "<h2>कृपया मुख्य पृष्ठ पर वापस जाएँ।</h2>";
         return;
      }
      
      const chapter = chapters.find(c => c.id == chapterId);
      if (chapter) {
         titleElem.innerText = "अध्याय " + chapter.id + ": " + chapter.title;
         document.title = "नोट्स - " + chapter.title;
      } else {
         titleElem.innerText = "अध्याय " + chapterId;
      }

      // Check Google Docs database
      const docId = googleDocsDb ? googleDocsDb[chapterId] : null;

      if (docId) {
         // Show iframe, hit preview URL
         const iframeUrl = `https://docs.google.com/document/d/${docId}/preview`;
         iframe.src = iframeUrl;
         
         // When iframe finishes loading, hide the "Loading..." message
         iframe.onload = () => {
            loadingMsg.style.display = 'none';
            iframe.style.display = 'block';
         };
      } else {
         titleElem.innerText = `दस्तावेज़ नहीं मिला`;
         loadingMsg.innerHTML = `<h2 style="color: #ff5252;">⚠️ अध्याय ${chapterId} के लिए कोई Google Doc लिंक नहीं किया गया है।</h2>`;
      }
    });
  </script>
</body>
</html>
