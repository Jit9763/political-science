<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>प्रश्न-उत्तर - प्रीमियम HTML व्यू</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        :root {
            --qa-accent: #8b5cf6;
            --qa-accent-dark: #7c3aed;
        }
        .page-container {
            width: 95%;
            max-width: 1400px; /* Still capped for readability but much wider */
            margin: 40px auto;
            background: white;
            color: #1a202c;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .loading {
            text-align: center;
            padding: 100px;
            font-size: 1.5rem;
        }

        /* Action Bar for Copy/Print - Changed to absolute to scroll with content */
        .action-bar {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 1100;
        }

        .action-btn {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            border: 2px solid var(--qa-accent);
            background: #1e293b;
            color: white;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .action-btn:hover {
            transform: scale(1.1);
            background: var(--qa-accent);
        }

        .btn-copy.success {
            background: #059669;
            border-color: #10b981;
        }

        @media print {
            .bg-animation, 
            .floating-home-btn, 
            .action-bar {
                display: none !important;
            }
            body { 
                background: white !important; 
                margin: 0; 
                padding: 0;
            }
            .container {
                padding: 0;
                margin: 0;
            }
            .page-container {
                width: 100% !important;
                max-width: none !important;
                box-shadow: none !important;
                margin: 0 !important;
                padding: 20px !important;
                border-radius: 0 !important;
                background: white !important;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="container" style="position: relative;">
        <!-- Floating Home Button -->
        <a href="index.html" class="floating-home-btn" style="position: fixed; bottom: 30px; left: 30px; z-index: 1000; background: #1e293b; color: white; padding: 15px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.3); border: 2px solid var(--qa-accent); display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">🏠</a>

        <div class="page-container" style="position: relative;">
            <div class="action-bar">
                <button id="floatingCopyBtn" class="action-btn btn-copy" onclick="copyEntireContent()" title="Copy for Google Docs">📋</button>
                <button class="action-btn" onclick="window.print()" title="Print / Save as PDF">🖨️</button>
            </div>

            <div id="qa-content">
                <div class="loading">प्रश्न-उत्तर लोड हो रहे हैं...</div>
            </div>
        </div>
    </div>

    <script>
        async function copyEntireContent() {
            const btn = document.getElementById('floatingCopyBtn');
            const target = document.getElementById('qa-content');

            const clone = target.cloneNode(true);
            const images = clone.querySelectorAll('img');
            images.forEach(img => {
                img.setAttribute('src', img.src);
            });

            const content = clone.innerHTML;

            try {
                const blob = new Blob([content], { type: 'text/html' });
                const item = new ClipboardItem({ 'text/html': blob });
                await navigator.clipboard.write([item]);
                
                btn.innerText = '✅';
                btn.classList.add('success');
                
                setTimeout(() => {
                    btn.innerText = '📋';
                    btn.classList.remove('success');
                }, 3000);
            } catch (err) {
                alert('Copy failed: ' + err);
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (id && parseInt(id) >= 1 && parseInt(id) <= 15) {
                try {
                    const response = await fetch(`qa_master_ch${id}.html`);
                    if (!response.ok) throw new Error('File not found');

                    const html = await response.text();
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const content = doc.getElementById('contentToCopy');

                    if (content) {
                        document.getElementById('qa-content').innerHTML = content.innerHTML;
                        document.title = "Q&A - चैप्टर " + id;
                    } else {
                        document.getElementById('qa-content').innerHTML = "<p>त्रुटि: प्रश्न-उत्तर प्राप्त नहीं हो सके।</p>";
                    }
                } catch (err) {
                    document.getElementById('qa-content').innerHTML = `<p>त्रुटि: चैप्टर ${id} के प्रश्न-उत्तर अभी उपलब्ध नहीं हैं।</p>`;
                }
            } else {
                document.getElementById('qa-content').innerHTML = "<h3>चैप्टर " + (id || "") + " के लिए Q&A जल्द ही आ रहा है!</h3>";
            }
        });
    </script>
</body>
</html>
